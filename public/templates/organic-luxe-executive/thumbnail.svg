<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="midnight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121528"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b46c1"/>
      <stop offset="100%" stop-color="#4c3b9c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8d9a8"/>
      <stop offset="100%" stop-color="#d4bc8e"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="10" fill="#faf8f5"/>
  <!-- Dark header -->
  <rect width="240" height="56" rx="10" fill="url(#midnight)"/>
  <path d="M0,0 C60,30 140,10 200,28 C220,34 240,20 240,0 Z" fill="url(#indigo)" opacity="0.65"/>
  <path d="M160,0 C200,24 230,12 240,36 L240,0 Z" fill="#7c3aed" opacity="0.4"/>
  <!-- Photo -->
  <circle cx="36" cy="34" r="16" fill="#121528" stroke="url(#gold)" stroke-width="2"/>
  <!-- Name -->
  <text x="62" y="28" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.6">ISAIAH J.</text>
  <text x="62" y="40" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.6">MONTGOMERY</text>
  <text x="62" y="50" font-family="Arial,sans-serif" font-size="4.5" fill="#d4bc8e" letter-spacing="1">EXECUTIVE STRATEGIST</text>
  <!-- Gold curve -->
  <path d="M0,52 Q120,44 240,50" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Left column -->
  <rect x="14" y="64" width="100" height="38" rx="8" fill="#fff" stroke="rgba(76,59,156,0.15)"/>
  <rect x="14" y="64" width="52" height="12" rx="6" fill="url(#indigo)"/>
  <circle cx="22" cy="88" r="3" fill="#d4bc8e"/>
  <circle cx="22" cy="96" r="3" fill="#d4bc8e" opacity="0.6"/>
  <!-- Project cards -->
  <rect x="14" y="108" width="46" height="40" rx="6" fill="#fff" stroke="rgba(76,59,156,0.12)"/>
  <rect x="14" y="108" width="46" height="14" rx="6" fill="url(#indigo)" opacity="0.7"/>
  <rect x="68" y="108" width="46" height="40" rx="6" fill="#fff" stroke="rgba(76,59,156,0.12)"/>
  <rect x="68" y="108" width="46" height="14" rx="6" fill="url(#indigo)" opacity="0.7"/>
  <!-- Right column skill circles -->
  <circle cx="168" cy="82" r="18" fill="url(#indigo)"/>
  <circle cx="198" cy="82" r="18" fill="#5b21b6"/>
  <circle cx="168" cy="108" r="16" fill="#7c3aed" opacity="0.85"/>
  <circle cx="198" cy="108" r="16" fill="url(#indigo)" opacity="0.75"/>
  <!-- Corner geo -->
  <path d="M240,160 L240,120 L200,160 Z" fill="none" stroke="#d4bc8e" stroke-width="0.6" opacity="0.4"/>
</svg>
