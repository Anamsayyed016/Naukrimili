<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a060"/>
      <stop offset="50%" stop-color="#c87840"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5c"/>
      <stop offset="100%" stop-color="#0a4a44"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c87840"/>
      <stop offset="100%" stop-color="#c99585"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="10" fill="#faf6f0"/>
  <!-- Ribbon -->
  <path d="M240,0 Q210,50 230,90 T220,140 L240,160 L240,0 Z" fill="url(#copper)" opacity="0.82"/>
  <path d="M240,10 Q215,55 228,95 T222,135" fill="none" stroke="#f0c090" stroke-width="2" opacity="0.6"/>
  <path d="M240,18 Q218,58 226,98" fill="none" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <!-- Photo -->
  <rect x="14" y="18" width="44" height="44" rx="3" fill="none" stroke="#c87840" stroke-width="1.5" transform="rotate(-4 36 40)"/>
  <circle cx="36" cy="42" r="18" fill="url(#emerald)" stroke="#146b62" stroke-width="2"/>
  <!-- Name -->
  <text x="68" y="34" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1a4d42">OLIVER</text>
  <text x="68" y="48" font-family="Georgia,serif" font-size="11" font-weight="700" fill="url(#rose)">HAYES</text>
  <text x="68" y="58" font-family="Arial,sans-serif" font-size="4.5" fill="#1a4d42" letter-spacing="1">CHIEF MARKETING OFFICER</text>
  <line x1="68" y1="64" x2="200" y2="64" stroke="#c87840" stroke-width="0.6" opacity="0.4"/>
  <!-- Left timeline -->
  <line x1="28" y1="78" x2="28" y2="130" stroke="#146b62" stroke-width="1.2" opacity="0.35"/>
  <circle cx="28" cy="88" r="4" fill="#c87840"/>
  <rect x="38" y="80" width="90" height="22" rx="5" fill="#fff" stroke="rgba(20,107,98,0.12)"/>
  <circle cx="28" cy="108" r="4" fill="#c87840" opacity="0.7"/>
  <rect x="38" y="100" width="90" height="22" rx="5" fill="#fff" stroke="rgba(20,107,98,0.12)"/>
  <!-- Project cards -->
  <rect x="14" y="118" width="36" height="34" rx="4" fill="#fff" stroke="rgba(20,107,98,0.1)"/>
  <rect x="14" y="118" width="36" height="12" rx="4" fill="url(#emerald)"/>
  <rect x="54" y="118" width="36" height="34" rx="4" fill="#fff" stroke="rgba(20,107,98,0.1)"/>
  <rect x="54" y="118" width="36" height="12" rx="4" fill="url(#emerald)"/>
  <!-- Right skills -->
  <rect x="148" y="76" width="52" height="10" rx="5" fill="url(#emerald)"/>
  <rect x="148" y="90" width="52" height="4" rx="2" fill="rgba(200,120,64,0.2)"/>
  <rect x="148" y="90" width="44" height="4" rx="2" fill="url(#copper)" opacity="0.7"/>
  <rect x="148" y="102" width="48" height="10" rx="5" fill="url(#emerald)"/>
  <rect x="148" y="116" width="48" height="4" rx="2" fill="rgba(200,120,64,0.2)"/>
  <rect x="148" y="116" width="38" height="4" rx="2" fill="url(#copper)" opacity="0.7"/>
  <!-- Achievement card -->
  <rect x="148" y="128" width="76" height="18" rx="4" fill="#fff" stroke="rgba(200,120,64,0.15)"/>
  <path d="M154,137 L156,133 L158,137 L162,137 L159,140 L160,144 L156,142 L152,144 L153,140 L150,137 Z" fill="#c87840" transform="scale(0.5) translate(308,274)"/>
