  <!-- Footer -->
  <rect y="500" width="400" height="20" fill="#2a2e32"/>
  <text x="200" y="513" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="2">VELVET HORIZON EXECUTIVE</text>
