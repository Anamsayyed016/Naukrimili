  <text x="108" y="48" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#1a4d42" letter-spacing="1">OLIVER</text>
  <text x="108" y="72" font-family="Georgia,serif" font-size="22" font-weight="700" fill="url(#rose)" letter-spacing="1">HAYES</text>
