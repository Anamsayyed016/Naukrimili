  <rect x="276" y="180" width="100" height="6" rx="3" fill="rgba(200,120,64,0.2)"/>
  <rect x="276" y="180" width="88" height="6" rx="3" fill="url(#copper)" opacity="0.75"/>
  <rect x="276" y="196" width="92" height="14" rx="7" fill="url(#emerald)"/>
  <rect x="276" y="214" width="92" height="6" rx="3" fill="rgba(200,120,64,0.2)"/>
  <rect x="276" y="214" width="76" height="6" rx="3" fill="url(#copper)" opacity="0.75"/>
  <rect x="276" y="230" width="96" height="14" rx="7" fill="url(#emerald)"/>
  <rect x="276" y="248" width="96" height="6" rx="3" fill="rgba(200,120,64,0.2)"/>
  <rect x="276" y="248" width="82" height="6" rx="3" fill="url(#copper)" opacity="0.75"/>

