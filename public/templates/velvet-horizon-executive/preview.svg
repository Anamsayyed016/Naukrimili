  <text x="276" y="280" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1a4d42" letter-spacing="1">ACHIEVEMENTS</text>
  <rect x="276" y="288" width="104" height="28" rx="5" fill="#fff" stroke="rgba(200,120,64,0.15)"/>
  <path d="M284,302 L286,298 L288,302 L292,302 L289,305 L290,309 L286,307 L282,309 L283,305 L280,302 Z" fill="#c87840"/>
  <rect x="276" y="322" width="104" height="28" rx="5" fill="#fff" stroke="rgba(200,120,64,0.15)"/>

  <text x="276" y="372" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1a4d42" letter-spacing="1">CERTIFICATIONS</text>
