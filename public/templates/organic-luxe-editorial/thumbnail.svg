<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f1"/>
      <stop offset="100%" stop-color="#f2e7d6"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c16a4b"/>
      <stop offset="100%" stop-color="#7d3e2f"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bb08f"/>
      <stop offset="100%" stop-color="#6f8a69"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f5a45"/>
      <stop offset="100%" stop-color="#234636"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="10" fill="url(#sand)"/>
  <!-- Layered paper-cut hero -->
  <path d="M0,0 L240,0 L240,52 Q170,68 120,60 Q60,52 0,64 Z" fill="#f2e7d6" opacity="0.95"/>
  <path d="M0,0 C60,18 120,8 180,22 C210,30 240,14 240,0 Z" fill="url(#terra)" opacity="0.5"/>
  <path d="M0,12 C70,36 140,24 200,40 C220,46 240,34 240,18 L240,0 L0,0 Z" fill="url(#sage)" opacity="0.38"/>
  <path d="M0,28 C80,52 160,40 220,56 C235,60 240,50 240,36 L240,0 L0,0 Z" fill="url(#forest)" opacity="0.22"/>
  <!-- Centered photo -->
  <circle cx="120" cy="52" r="18" fill="#234636" opacity="0.15"/>
  <circle cx="120" cy="52" r="14" fill="#234636" stroke="#caa36c" stroke-width="2"/>
  <!-- Centered name -->
  <text x="120" y="82" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636">NASARA HANDSON</text>
  <text x="120" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#7d3e2f" letter-spacing="1.2">PROFESSIONAL STRATEGIST</text>
  <!-- Star divider -->
  <line x1="48" y1="100" x2="108" y2="100" stroke="#caa36c" stroke-width="0.8" opacity="0.5"/>
  <path d="M120,96 L121.5,99.5 L125,100 L121.5,100.5 L120,104 L118.5,100.5 L115,100 L118.5,99.5 Z" fill="#caa36c"/>
  <line x1="132" y1="100" x2="192" y2="100" stroke="#caa36c" stroke-width="0.8" opacity="0.5"/>
  <!-- Two columns -->
  <rect x="16" y="108" width="88" height="42" rx="10" fill="rgba(255,255,255,0.82)" stroke="rgba(202,163,108,0.3)"/>
  <circle cx="28" cy="122" r="3" fill="#c16a4b"/>
  <circle cx="28" cy="134" r="3" fill="#c16a4b" opacity="0.6"/>
  <rect x="136" y="108" width="88" height="20" rx="10" fill="rgba(255,255,255,0.82)" stroke="rgba(202,163,108,0.3)"/>
  <!-- Expertise cards -->
  <rect x="136" y="132" width="40" height="18" rx="8" fill="url(#forest)"/>
  <rect x="180" y="132" width="44" height="18" rx="8" fill="url(#terra)"/>
  <!-- Bottom accent -->
  <path d="M200,160 C170,148 190,120 160,108 C140,100 120,120 100,108 C80,96 60,120 40,108 C20,96 0,120 0,100 L240,100 L240,160 Z" fill="url(#sage)" opacity="0.18"/>
</svg>
