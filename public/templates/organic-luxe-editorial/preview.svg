<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f1"/>
      <stop offset="100%" stop-color="#f2e7d6"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c16a4b"/>
      <stop offset="55%" stop-color="#a6543c"/>
      <stop offset="100%" stop-color="#7d3e2f"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bb08f"/>
      <stop offset="100%" stop-color="#6f8a69"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f5a45"/>
      <stop offset="100%" stop-color="#234636"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0c08a"/>
      <stop offset="60%" stop-color="#a57d45"/>
      <stop offset="100%" stop-color="#caa36c"/>
    </linearGradient>
    <pattern id="topo" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M-10 30 Q30 10 70 30 T150 30" fill="none" stroke="#234636" stroke-width="0.6" opacity="0.10"/>
      <path d="M-10 60 Q30 40 70 60 T150 60" fill="none" stroke="#c16a4b" stroke-width="0.5" opacity="0.08"/>
      <path d="M-10 90 Q30 70 70 90 T150 90" fill="none" stroke="#caa36c" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="400" height="520" fill="url(#sand)"/>
  <rect width="400" height="520" fill="url(#topo)" opacity="0.55"/>

  <!-- Layered paper-cut hero band -->
  <path d="M0,0 L400,0 L400,88 Q288,118 200,104 Q104,88 0,118 Z" fill="#f2e7d6" opacity="0.96"/>
  <path d="M0,0 C100,32 200,16 300,36 C350,46 400,24 400,0 Z" fill="url(#terra)" opacity="0.52"/>
  <path d="M0,20 C90,56 200,40 310,64 C360,74 400,52 400,28 L400,0 L0,0 Z" fill="url(#sage)" opacity="0.4"/>
  <path d="M0,44 C110,80 230,64 340,88 C370,94 400,78 400,56 L400,0 L0,0 Z" fill="url(#forest)" opacity="0.26"/>

  <!-- Centered photo -->
  <circle cx="200" cy="88" r="34" fill="#234636" opacity="0.15"/>
  <circle cx="200" cy="88" r="26" fill="#234636" stroke="url(#bronze)" stroke-width="3"/>

  <!-- Centered identity -->
  <text x="200" y="138" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#234636" letter-spacing="0.6">NASARA HANDSON</text>
  <text x="200" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#7d3e2f" letter-spacing="2.5">PROFESSIONAL STRATEGIST</text>

  <!-- Star divider -->
  <line x1="80" y1="168" x2="182" y2="168" stroke="url(#bronze)" stroke-width="1" opacity="0.45"/>
  <path d="M200,162 L203,170 L212,171 L205,177 L207,186 L200,181 L193,186 L195,177 L188,171 L197,170 Z" fill="#caa36c" opacity="0.9"/>
  <line x1="218" y1="168" x2="320" y2="168" stroke="url(#bronze)" stroke-width="1" opacity="0.45"/>

  <!-- Contact dots -->
  <circle cx="130" cy="182" r="5" fill="#c16a4b"/>
  <circle cx="160" cy="182" r="5" fill="#c16a4b"/>
  <circle cx="200" cy="182" r="5" fill="#234636"/>
  <circle cx="240" cy="182" r="5" fill="#caa36c"/>
  <circle cx="270" cy="182" r="5" fill="#c16a4b"/>

  <!-- Left column: Experience timeline -->
  <text x="28" y="218" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">EXPERIENCE</text>
  <line x1="28" y1="228" x2="150" y2="228" stroke="#caa36c" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="244" x2="44" y2="340" stroke="#234636" stroke-width="1.5" opacity="0.25"/>
  <circle cx="44" cy="252" r="7" fill="#c16a4b" stroke="#fff" stroke-width="2"/>
  <circle cx="44" cy="292" r="7" fill="#c16a4b" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <circle cx="44" cy="332" r="7" fill="#c16a4b" stroke="#fff" stroke-width="2" opacity="0.45"/>

  <text x="28" y="368" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">CERTIFICATIONS</text>
  <line x1="28" y1="378" x2="150" y2="378" stroke="#caa36c" stroke-width="1" opacity="0.4"/>

  <!-- Right column -->
  <text x="178" y="218" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">PROFILE STATEMENT</text>
  <line x1="178" y1="228" x2="372" y2="228" stroke="#caa36c" stroke-width="1" opacity="0.4"/>
  <rect x="178" y="240" width="194" height="36" rx="6" fill="rgba(255,255,255,0.5)"/>

  <text x="178" y="296" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">SKILLS &amp; EXPERTISE</text>
  <line x1="178" y1="306" x2="372" y2="306" stroke="#caa36c" stroke-width="1" opacity="0.4"/>
  <!-- Expertise cards -->
  <rect x="178" y="316" width="92" height="44" rx="14" fill="url(#forest)"/>
  <rect x="278" y="316" width="94" height="44" rx="14" fill="url(#terra)"/>
  <!-- Skill chips -->
  <rect x="178" y="368" width="56" height="14" rx="7" fill="rgba(111,138,105,0.25)" stroke="rgba(111,138,105,0.4)"/>
  <rect x="240" y="368" width="48" height="14" rx="7" fill="rgba(111,138,105,0.25)" stroke="rgba(111,138,105,0.4)"/>
  <rect x="294" y="368" width="52" height="14" rx="7" fill="rgba(111,138,105,0.25)" stroke="rgba(111,138,105,0.4)"/>

  <text x="178" y="404" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">PROJECTS</text>
  <text x="178" y="444" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">EDUCATION</text>
  <text x="178" y="480" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#234636" letter-spacing="1.2">ACHIEVEMENTS</text>

  <!-- Bottom corner organic accent -->
  <path d="M400,520 C340,500 360,440 300,420 C260,406 220,440 180,420 C140,400 100,440 60,420 C30,406 0,440 0,400 L400,400 L400,520 Z" fill="url(#sage)" opacity="0.2"/>
  <path d="M400,520 C360,508 380,460 340,448 C310,438 280,460 250,448 C220,436 190,460 160,448 C130,436 100,460 70,448 C40,436 20,460 0,440 L400,440 L400,520 Z" fill="url(#terra)" opacity="0.14"/>

  <text x="200" y="512" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#7d3e2f" opacity="0.7">Organic Luxe Editorial</text>
</svg>
